name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: "aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: "x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      HAS_TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libsoup-3.0-dev

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install

      - name: Bundle plugins
        run: bun run bundle:plugins

      - name: Verify bundled plugins
        shell: bash
        run: |
          COUNT=$(find src-tauri/resources/bundled_plugins -maxdepth 2 -name plugin.json | wc -l | tr -d ' ')
          if [[ "$COUNT" -lt 1 ]]; then
            echo "No bundled plugins found under src-tauri/resources/bundled_plugins."
            exit 1
          fi

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "Missing RELEASE_TAG (push a v* tag)."
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid RELEASE_TAG: $RELEASE_TAG (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Validate app version matches tag
        shell: bash
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"

          TAURI_CONF_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          CARGO_VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' ./src-tauri/Cargo.toml)
          PKG_VERSION=$(node -p 'require("./package.json").version')

          if [[ "$TAURI_CONF_VERSION" != "$TAG_VERSION" ]]; then
            echo "src-tauri/tauri.conf.json version ($TAURI_CONF_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "src-tauri/Cargo.toml version ($CARGO_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PKG_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Disable updater artifacts if no signing key
        if: env.HAS_TAURI_SIGNING_KEY == 'false'
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.bundle.createUpdaterArtifacts = false;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2));
          "
          echo "Updater artifacts disabled (no TAURI_SIGNING_PRIVATE_KEY secret)"

      - name: Import Apple Developer Certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Pre-build cargo check (capture compile errors)
        id: cargo-check
        working-directory: src-tauri
        shell: bash
        run: |
          set +e
          if [ -n "${{ matrix.rust_targets }}" ]; then
            TARGET_FLAG="--target ${{ matrix.rust_targets }}"
          else
            TARGET_FLAG=""
          fi
          echo "Running: cargo build --release $TARGET_FLAG"
          cargo build --release $TARGET_FLAG 2>&1 | tee cargo-check-output.txt
          EXIT=${PIPESTATUS[0]}
          echo ""
          echo "::group::Last 150 lines of cargo output"
          tail -n 150 cargo-check-output.txt
          echo "::endgroup::"
          if [ "$EXIT" != "0" ]; then
            # Surface distinct error-looking lines as GitHub annotations
            {
              grep "^error" cargo-check-output.txt
              grep -i "^  Caused by:" cargo-check-output.txt
              grep -i "panicked at" cargo-check-output.txt
              grep -i "fatal error" cargo-check-output.txt
              grep -i "not found" cargo-check-output.txt | head -3
            } | sort -u | head -15 | while IFS= read -r line; do
              clean=$(echo "$line" | sed 's/%/%25/g; s/\r/%0D/g')
              echo "::error::$clean"
            done
          fi
          exit $EXIT

      - name: Upload cargo output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-output-${{ matrix.platform }}-${{ strategy.job-index }}
          path: src-tauri/cargo-check-output.txt
          if-no-files-found: ignore

      # Run tauri build manually so errors surface in logs
      - name: Tauri build
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          RUST_BACKTRACE: full
        run: |
          set -e
          ARGS="${{ matrix.args }}"
          echo ">>> Running: bunx tauri build $ARGS --verbose"
          bunx tauri build $ARGS --verbose 2>&1 | tee tauri-build-output.txt

      - name: Upload tauri build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}-${{ strategy.job-index }}
          path: tauri-build-output.txt
          if-no-files-found: ignore

      # Collect bundle paths into a multi-line env var for the release uploader
      - name: Locate bundle files
        if: success()
        shell: bash
        run: |
          set -e
          if [ -n "${{ matrix.rust_targets }}" ]; then
            BUNDLE_DIR="src-tauri/target/${{ matrix.rust_targets }}/release/bundle"
          else
            BUNDLE_DIR="src-tauri/target/release/bundle"
          fi
          echo "Bundle dir: $BUNDLE_DIR"
          ls -R "$BUNDLE_DIR" || true
          # Collect everything under the bundle dir that looks shippable
          mkdir -p release-assets
          find "$BUNDLE_DIR" -maxdepth 3 -type f \( \
            -name '*.dmg' \
            -o -name '*.msi' \
            -o -name '*-setup.exe' \
            -o -name '*.deb' \
            -o -name '*.rpm' \
            -o -name '*.AppImage' \
          \) -exec cp -v {} release-assets/ \; 2>/dev/null || true
          ls -la release-assets/ || true

      - name: Upload bundles to release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: true
          files: release-assets/*
          fail_on_unmatched_files: false
